<!DOCTYPE html>
<html>
   <head>
     <title>Año2024.C</title>
       <meta charset="UTF-8">
       <meta http-equiv="X-UA-compatible" content="IE-edge">
       <meta name="viewport" content="width=device=width, initial-scale=1.0">
    
   </head>
   <body id="todo">
     <h1 id="ttl"></h1></h1>
     <div id="principal">
      
      <input type="text" id="nombre" placeholder="nombre">
      <br>
      <br>
      <button
  id="amor"
  >Ingresar</button>
  <div id="ocultarb">
    
  </div>  <button id="amor2">cambiar musica</button>
  </div>
 <button id="amor3">cambiar musica3</button>
  <div id="ale">
   <div id="ale"></div>
   </div>
  </div>
  <audio controls id="audio" onended="reiniciar()">
    <source src="musicanavidenas.mp3" type="audio/mp3">
  </audio>
  <audio controls id="audio2">
    <source src="corali.mp3" type="audio/mp3">
  </audio>
  <audio controls id="audio3">
    <source src="cerox.mp3" type="audio/mp3">
    
  </audio>
  <button id="volver">volver1</button>

      <style>
      
      h1{
        color: hsla(130,100%,50%,0.9);
        -webkit-text-stroke:1px purple;
        font-weight:1000;
      }
      #principal{
        width: 100%;
      }
     @media(max-width:767px){
    
          #amor,#nombre{
          
           border-color:hsla(130,100%,50%,0.9);
           border-radius:5px 5px 5px 5px ;
           border-width: 4px;
          }
          #amor{
             width:200px;
            height:40px;
           }
           #nombre{
             width: 200px;
             height:40px;
           }
           #ale{
             color: hsla(130,100%,50%,0.9);
             
         
           }
           #audio{
             display:none;
           }
           #amor2{
             display:none;
             border: 1px solid hsla(130,100%,50%,0.9);
             border-radius:5px;
             
           }
          
           #audio2,#audio3{
             display: none;
           }
           #amor2,#volver,#amor3{
             display: none;
            
           }
           #neutro(){
             display: none;
           }
       
          }
    
  
   
      </style>
      
      <script>
          function iniciar(){
            
            nombre=document.getElementById("nombre");
            var btn=document.getElementById("amor");
            btn.addEventListener("click",iniciar2);
          }
          function iniciar2(){
            if(nombre.value===""){
              alert("ingresa tu nombre:");
            }else{
              nombre.style.display="none";
              var btn=document.getElementById("amor");
              btn.style.display="none";
            
            nmbr=document.getElementById("nombre").value;
            crear=document.getElementById("ale");
            crear.innerHTML="Feliz Año 2024   "+nmbr+" 🌿 ";
            crear.style.display="flex";
           crear.style.justifyContent="center";
           crear.style.alignItems="center";
           crear.style.fontFamily="Arial sans-serif";
           crear.style.fontWeight="1000";
           crear.style.fontSize="5em";
           crear.style.fontStyle="italic";
           crear.style.textShadow="4px 4px 4px purple ";
        
            document.body.appendChild(crear);
            document.getElementById("nombre").value="";
            
            function uno(){
              colores=["purple","green","red","blue","yellow","orange","pink","black","white","cyan","magenta","turquoise","lavander","indigo","maroon","olive","teal","peach","coral","gold","silver"];
               colorcambio=colores[Math.floor(Math.random()*colores.length)];
              crear2=document.getElementById("ttl");
              
               
              body=document.getElementById("todo");
              body.style.background=colorcambio;
              setTimeout(uno,100);
              audio();
             
            }
            uno();
            }   
            
          }  
            function audio(){
              audio=document.getElementById("audio");
              lista=["corali.mp3","corali2.mp3","coralih.mp3"];
              currentIndex=0;
              amor2=document.getElementById("amor2");
              amor2.style.display="block";
              document.body.appendChild(amor2);
              ocultarb=document.getElementById("ocultarb");
              ocultarb.style.textAlign="center";
              
              reproducir();
              amor2.addEventListener("click",reproducir);
              
              function reproducir(){
                audio.src=lista[currentIndex];
                audio.play();
                currentIndex=(currentIndex+1)%lista.length;
              }
              
            }
          window.addEventListener("load",iniciar);
      </script>
   </body>
</html>
