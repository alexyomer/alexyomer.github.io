<!DOCTYPE html>
<html>
   <head>
     <title>Feliz Navidad</title>
       <meta charset="UTF-8">
       <meta http-equiv="X-UA-compatible" content="IE-edge">
       <meta name="viewport" content="width=device=width, initial-scale=1.0">
    
   </head>
   <body id="todo">
     <h1 id="ttl">Estilo Navideño(EN): </h1>
     <div id="principal">
      
      <input type="text" id="nombre" placeholder="nombre">
      <br>
      <br>
      <button
  id="amor"
  >Ingresar</button>
  <div id="ale">
   <div id="ale"></div>
   </div>
  </div>
      <style>
      
      h1{
        color: hsla(130,100%,50%,0.9);
        -webkit-text-stroke:1px purple;
        font-weight:1000;
      }
      #principal{
        width: 99%;
      }
     @media(max-width:767px){
    
          #amor,#nombre{
          
           border-color:hsla(130,100%,50%,0.9);
           border-radius:5px 5px 5px 5px ;
           border-width: 4px;
          }
          #amor{
             width:200px;
            height:40px;
           }
           #nombre{
             width: 200px;
             height:40px;
           }
           #ale{
             color: hsla(130,100%,50%,0.9);
             
         
           }
         
          }
  
   
      </style>
      
      <script>
          function iniciar(){
            nombre=document.getElementById("nombre");
            var btn=document.getElementById("amor");
            btn.addEventListener("click",iniciar2);
          }
          function iniciar2(){
            if(nombre.value===""){
              alert("ingresa tu nombre:")
            }else{
              nombre.style.display="none";
              var btn=document.getElementById("amor");
              btn.style.display="none";
            
            nmbr=document.getElementById("nombre").value;
            crear=document.getElementById("ale");
            crear.innerHTML="Feliz Navidad  "+nmbr;
            crear.style.display="flex";
           crear.style.justifyContent="center";
           crear.style.alignItems="center";
           crear.style.fontWeight="900";
           crear.style.fontSize="90px";
           
            document.body.appendChild(crear);
            document.getElementById("nombre").value="";
            }
            function uno(){
              colores=["purple","green","red","blue","yellow","orange","pink","black","white","cyan","magenta","turquoise","lavander","indigo","maroon","olive","teal","peach","coral","gold","silver"];
               colorcambio=colores[Math.floor(Math.random()*colores.length)];
              crear2=document.getElementById("ttl");
              crear2.style.color=colorcambio;
              crear.style.color=colorcambio;
              body=document.getElementById("todo");
              body.style.background=colorcambio;
              setTimeout(uno,100);
              
            }
            uno();
          }
        
           
          
          
          window.addEventListener("load",iniciar);
      </script>
   </body>
</html>
