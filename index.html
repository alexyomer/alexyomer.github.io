<!DOCTYPE html>
<html>
   <head>
     <title>Tiempo y suerte</title>
       <meta charset="UTF-8">
       <meta http-equiv="X-UA-compatible" content="IE-edge">
       <meta name="viewport" content="width=device=width, initial-scale=1.0">
    
   </head>
   <body id="body">
     <h1>juego,suerte y tiempo:</h1>
     <div id="principal">
      
      <input type="text" id="nombre" placeholder="nombre">
      <br>
      <br>
      <button
  id="amor"
  >Enviar su nombre</button>
  </div>
      <style>
      h1{
        color: hsla(130,100%,50%,0.9);
        -webkit-text-stroke:1px purple;
        font-weight:1000;
      }
      #principal{
        width: 99%;
      }
     @media(max-width:767px){
    
          #amor,#nombre{
          
           border-color:hsla(130,100%,50%,0.9);
           border-radius:5px 5px 5px 5px ;
           border-width: 4px;
          }
          #amor{
             width:200px;
            height:40px;
           }
           #nombre{
             width: 200px;
             height:40px;
           }
          }
  
   
      </style>
      
      <script>
          function iniciar(){
            nombre=document.getElementById("nombre");
            var btn=document.getElementById("amor");
            btn.addEventListener("click",iniciar2);
          }
          function iniciar2(){
            if(nombre.value===""){
              alert("ingresa tu nombre:")
            }else{
              
            
            nmbr=document.getElementById("nombre").value;
            alert("Hola: "+nmbr+" encantado en responderte");
            document.getElementById("nombre").value="";
            }
          }
          window.addEventListener("load",iniciar);
      </script>
   </body>
</html>
