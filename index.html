<!DOCTYPE html>
<html>
   <head>
     <title>
       Suerte y tiempo
       <meta name="viewport" content="width=device=width, initial-scale=1.0">
     </title>
   </head>
   <body id="body">
      <input type="text" id="nombre" placeholder="nombre">
      <br>
      <br>
      <button 
    android:layout_width="wrap_content";
    android:layout_height="wrap_content";
    android:layout_margin="16dp";
  id="amor"
  >Escriba su nombre</button>
      <style>
          @media(max-width=767px){
            #body{
               position: absolute;
               
            }
          }
          #amor,#nombre{
           color:purple;
           border-color: hsla(130,100%,50%,0.9);
           border-radius:5px 5px 5px 5px ;
          }
          #amor,#nombre{
            width: 200px;
            height:40px;
          }
  
  
   
      </style>
      
      <script>
          function iniciar(){
            nombre=document.getElementById("nombre");
            var btn=document.getElementById("amor");
            btn.addEventListener("click",iniciar2);
          }
          function iniciar2(){
            if(nombre.value===""){
              alert("ingresa tu nombre:")
            }else{
              
            
            nmbr=document.getElementById("nombre").value;
            alert("Hola: "+nmbr+" encantado en responderte");
            document.getElementById("nombre").value="";
            }
          }
          window.addEventListener("load",iniciar);
      </script>
   </body>
</html>
